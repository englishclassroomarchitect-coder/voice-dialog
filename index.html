<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Record Voice Note</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #F7F4F2;
  color: #2D2D2F;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 16px;
}
.card {
  background: #fff;
  border-radius: 10px;
  border: 1px solid #D8D2CD;
  padding: 20px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.student-name {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #2B7980;
  margin-bottom: 4px;
}
h2 { font-size: 15px; font-weight: 600; color: #070034; margin-bottom: 16px; }
.label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
.transcript-box {
  background: #F7F4F2;
  border: 1px solid #D8D2CD;
  border-radius: 6px;
  padding: 12px;
  min-height: 100px;
  font-size: 13px;
  line-height: 1.7;
  color: #2D2D2F;
  margin-bottom: 10px;
  white-space: pre-wrap;
  word-break: break-word;
  transition: border-color 0.15s, background 0.15s;
}
.transcript-box.listening { border-color: #2B7980; background: #F0FAF9; }
.transcript-box.empty { color: #bbb; font-style: italic; }
.status {
  font-size: 11px; color: #888; margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px; min-height: 18px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
.dot.active { background: #CD1743; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
.btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
button {
  flex: 1; padding: 10px 14px; border-radius: 6px;
  border: 1px solid #D8D2CD; font-size: 12px; font-weight: 500;
  cursor: pointer; background: #fff; color: #2D2D2F; transition: background 0.1s;
}
button:hover { background: #F0EBE8; }
button.record { background: #CD1743; color: #fff; border-color: #CD1743; }
button.record.on { background: #2D2D2F; border-color: #2D2D2F; }
button.primary { background: #070034; color: #fff; border-color: #070034; }
button.primary:hover { background: #0a0050; }
button:disabled { opacity: 0.4; cursor: default; }
.error { color: #CD1743; font-size: 11px; margin-top: 8px; min-height: 16px; }
.success { color: #2B7980; font-size: 12px; text-align: center; padding: 10px 0; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="student-name" id="student-label"></div>
  <h2>Record Voice Note</h2>
  <div class="label">Transcription</div>
  <div class="transcript-box empty" id="transcript">Start recording to transcribe...</div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-text">Ready</span>
  </div>
  <div class="btn-row">
    <button class="record" id="record-btn" onclick="toggleRecording()">🎙 Record</button>
    <button id="clear-btn" onclick="clearTranscript()" disabled>Clear</button>
  </div>
  <div class="btn-row">
    <button onclick="window.close()">Cancel</button>
    <button class="primary" id="save-btn" onclick="confirmAndSave()" disabled>Use This Note →</button>
  </div>
  <div class="error"   id="error"></div>
  <div class="success" id="success">✓ Saved — you can close this tab.</div>
</div>

<script>
// ── CHANGE THIS to your deployed Apps Script web app URL ──
// Deploy → New deployment → Web app → Execute as "Me" → Access "Anyone"
// Copy the URL it gives you and paste it here:
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKT1Hazz7YTPuKC6QHqaVuvRxwLIq0cRVaZ_eMY1w/exec";

var recognition = null;
var isListening = false;
var fullText    = "";
var interim     = "";
var studentName = "";

(function() {
  var params = new URLSearchParams(window.location.search);
  studentName = params.get("student") || "";
  if (studentName) document.getElementById("student-label").textContent = studentName;
})();

function init() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    document.getElementById("error").textContent = "Speech recognition requires Chrome.";
    document.getElementById("record-btn").disabled = true;
    return;
  }
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = "en-US";
  recognition.onresult = function(e) {
    interim = "";
    for (var i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) fullText += e.results[i][0].transcript + " ";
      else interim += e.results[i][0].transcript;
    }
    updateDisplay();
  };
  recognition.onerror = function(e) {
    if (e.error === "no-speech") return;
    document.getElementById("error").textContent = "Mic error: " + e.error +
      (e.error === "not-allowed" ? " — allow microphone in browser settings." : "");
    stopListening();
  };
  recognition.onend = function() {
    if (isListening) { try { recognition.start(); } catch(e) {} }
  };
}

function toggleRecording() { isListening ? stopListening() : startListening(); }

function startListening() {
  if (!recognition) init();
  document.getElementById("error").textContent = "";
  isListening = true;
  try { recognition.start(); } catch(e) {}
  document.getElementById("record-btn").textContent = "⏹ Stop";
  document.getElementById("record-btn").classList.add("on");
  document.getElementById("dot").classList.add("active");
  document.getElementById("status-text").textContent = "Listening...";
  document.getElementById("transcript").classList.add("listening");
  document.getElementById("transcript").classList.remove("empty");
}

function stopListening() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  interim = "";
  document.getElementById("record-btn").textContent = "🎙 Record";
  document.getElementById("record-btn").classList.remove("on");
  document.getElementById("dot").classList.remove("active");
  document.getElementById("status-text").textContent = fullText.trim() ? "Done — review above." : "Ready";
  document.getElementById("transcript").classList.remove("listening");
  updateDisplay();
}

function updateDisplay() {
  var box  = document.getElementById("transcript");
  var text = fullText + (interim || "");
  if (text.trim()) {
    box.textContent = text;
    box.classList.remove("empty");
    document.getElementById("save-btn").disabled  = false;
    document.getElementById("clear-btn").disabled = false;
  } else {
    box.textContent = "Start recording to transcribe...";
    box.classList.add("empty");
    document.getElementById("save-btn").disabled  = true;
    document.getElementById("clear-btn").disabled = true;
  }
}

function clearTranscript() {
  stopListening(); fullText = ""; interim = ""; updateDisplay();
}

function confirmAndSave() {
  var text = fullText.trim();
  if (!text) return;
  stopListening();
  var btn = document.getElementById("save-btn");
  btn.textContent = "Saving...";
  btn.disabled = true;

  // Use a hidden form + iframe to avoid CORS/redirect issues with Apps Script
  var iframe = document.createElement("iframe");
  iframe.name = "voice-submit-frame";
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  var form = document.createElement("form");
  form.method = "POST";
  form.action = APPS_SCRIPT_URL;
  form.target = "voice-submit-frame";

  var fields = { text: text, student: studentName, token: "fbt-9k7Xm3pLwR2024chs" };
  for (var key in fields) {
    var input = document.createElement("input");
    input.type = "hidden";
    input.name = key;
    input.value = fields[key];
    form.appendChild(input);
  }

  document.body.appendChild(form);
  form.submit();

  // Give it a moment to land, then show success
  setTimeout(function() {
    document.getElementById("success").style.display = "block";
    btn.textContent = "Saved ✓";
    document.body.removeChild(form);
  }, 1500);
}

window.onload = init;
</script>
</body>
</html>
